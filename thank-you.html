<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thank You | Pixelogic</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

body{

margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#2563EB,#1E40AF);

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

}

.card{

background:#fff;

padding:60px;

border-radius:25px;

text-align:center;

max-width:600px;

width:90%;

box-shadow:0 20px 50px rgba(0,0,0,.25);

animation:fade .7s ease;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(40px);

}

to{

opacity:1;
transform:translateY(0);

}

}

.icon{

font-size:90px;

color:#22C55E;

margin-bottom:20px;

}

h1{

font-size:42px;

margin-bottom:15px;

}

p{

font-size:18px;

color:#64748B;

line-height:1.8;

}

.buttons{

display:flex;

justify-content:center;

gap:20px;

margin-top:35px;

flex-wrap:wrap;

}

.btn{

padding:15px 28px;

border-radius:12px;

text-decoration:none;

font-weight:600;

transition:.3s;

}

.home{

background:#2563EB;

color:#fff;

}

.home:hover{

background:#1D4ED8;

}

.whatsapp{

background:#25D366;

color:#fff;

}

.whatsapp:hover{

background:#1DA851;

}

</style>

</head>

<body>

<div class="card">

<i class="fa-solid fa-circle-check icon"></i>

<h1>Thank You!</h1>

<p>

Your inquiry has been received successfully.

<br><br>

Our Pixelogic team will contact you within <b>24 hours.</b>

</p>

<div class="buttons">

<a href="index.html" class="btn home">

🏠 Back to Home

</a>

<a href="https://wa.me/918601372054"

class="btn whatsapp"

target="_blank">

💬 Chat on WhatsApp

</a>

</div>

</div>

</body>

</html>
